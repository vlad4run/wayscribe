# wayscribe configuration — example / reference.
#
# Copy to ~/.config/wayscribe/config.toml and uncomment what you want to
# change. Every key is optional; the values shown are the built-in defaults,
# so an empty file (or no file at all) behaves exactly like this one.
#
#   cp /usr/share/doc/packages/wayscribe/config.example.toml \
#      ~/.config/wayscribe/config.toml

# --- FLM backend -------------------------------------------------------------
# endpoint = "http://localhost:52625"   # or a LAN host: "http://192.168.1.50:52625"
# model = "whisper-v3:turbo"
# request_timeout_sec = 60.0            # HTTP timeout per transcription POST

# --- Language ----------------------------------------------------------------
# language = "ru"                       # ISO-639-1; `wayscribe lang auto` for auto-detect
# language_from_layout = true           # follow the active KDE keyboard layout per recording
                                        # (overrides `language`; needs gdbus + a KDE session)
# languages = ["ru", "en"]              # cycled by `wayscribe lang next`

# --- Audio -------------------------------------------------------------------
# sample_rate = 16000
# input_device = "alsa_input.pci-0000_..."   # omit to use the default source

# --- Output ------------------------------------------------------------------
# outputs = ["clipboard", "notify"]     # also: "type" (ydotool; wtype on wlroots)
# auto_type = false                     # also type the transcript into the focused
                                        # window (sugar for adding "type" to outputs).
                                        # On KWin/Plasma use ydotool — wtype only works
                                        # on wlroots compositors. Types wherever focus
                                        # is when transcription finishes.
# live_notification = true              # one in-place-updated popup: recording timer +
                                        # mic-level bar, then status, then transcript.
                                        # Needs notify-send --replace-id (libnotify>=0.7);
                                        # set false for discrete popups.

# --- Safety rails ------------------------------------------------------------
# warmup = true                         # POST a 1s silent WAV at daemon startup
# max_duration_sec = 300                # hard cap; auto-stops + transcribes
# auto_stop = false                     # opt-in: silence-detection auto-stop
# auto_stop_silence_sec = 1.5           # required quiet window after first speech
# auto_stop_min_record_sec = 0.8        # never auto-stop in the first N seconds
# vad_rms_threshold = 500.0             # higher = needs louder speech

# --- Layout fixer (`wayscribe fix` / `translate` / `autocorrect`) ------------
# fix_source = "selection"              # "selection" (PRIMARY) or "last_word"
                                        # ("last_word" synthesizes Ctrl+Shift+Left)
# fix_last_word_count = 1               # words to grab in "last_word" mode
# switch_layout = false                 # flip the active KDE layout after a fix
# trigram_confidence_min = 0.15         # below this, defer to the LLM (if configured)

# --- LLM (chat) — separate from the STT endpoint above -----------------------
# llm_endpoint = ""                     # OpenAI-compatible chat URL; empty = LLM off
                                        # (a 2nd FLM container per BACKEND.md, or external)
# llm_model = ""                        # chat model name
# llm_api_key = ""                      # for external endpoints
# llm_timeout_sec = 30.0

# --- Global autocorrect (experimental, opt-in, KEYLOGGER-CLASS) --------------
# evdev_autocorrect = false             # master gate: reads /dev/input as you type.
                                        # Needs the `evdev` extra + `input` group.
                                        # Runtime on/off: `wayscribe autocorrect`.
